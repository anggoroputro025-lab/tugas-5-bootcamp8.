<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Putra Tech Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="#">BOSUNGSTORE</a>
        <div class="d-flex align-items-center">
            <button id="themeToggle" class="btn btn-link text-dark p-0 me-3">
                <i id="themeIcon" class="bi bi-moon-stars-fill fs-4"></i>
            </button>
            <input type="text" id="searchInput" class="form-control rounded-pill" placeholder="Cari gadget...">
        </div>
    </div>
</nav>

<div class="container">
    <div class="text-center mb-4">
        <button class="btn btn-primary filter-btn active rounded-pill px-4" data-filter="all">Semua</button>
        <button class="btn btn-outline-primary filter-btn rounded-pill px-4" data-filter="Laptop">Laptop</button>
        <button class="btn btn-outline-primary filter-btn rounded-pill px-4" data-filter="Smartphone">Smartphone</button>
        <button class="btn btn-outline-primary filter-btn rounded-pill px-4" data-filter="Aksesoris">Aksesoris</button>
    </div>

    <div id="productContainer" class="row g-4"></div>
</div>

<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content rounded-4 border-0">
            <div class="modal-body p-0">
                <div class="row g-0">
                    <div class="col-md-6 overflow-hidden" id="zoomArea" style="cursor: zoom-in;">
                        <img src="" id="modalImg" class="img-fluid h-100 w-100" style="object-fit: cover; transition: transform 0.2s ease-out;">
                    </div>
                    <div class="col-md-6 p-4 d-flex flex-column">
                        <button type="button" class="btn-close ms-auto mb-2" data-bs-dismiss="modal"></button>
                        <span id="modalCat" class="badge bg-primary-subtle text-primary mb-2 w-fit" style="width:fit-content"></span>
                        <h3 id="modalTitle" class="fw-bold mb-3"></h3>
                        <p id="modalDesc" class="text-muted mb-4"></p>
                        <h4 id="modalPrice" class="text-success fw-bold mt-auto mb-0"></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
